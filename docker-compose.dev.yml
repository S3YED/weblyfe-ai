services:
  postgres:
    image: postgres:16-alpine
    container_name: weblyfe-ai-pg-dev
    environment:
      POSTGRES_USER: appie
      POSTGRES_PASSWORD: appie_dev
      POSTGRES_DB: appie_dev
    ports:
      - "5433:5432"
    volumes:
      - appie_pg_dev:/var/lib/postgresql/data

volumes:
  appie_pg_dev:
